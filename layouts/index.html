{{ define "main" }}
<h1>最新文章</h1>
<div class="post-list">
  {{ range first 20 .Site.RegularPages }}
  <article>
    <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    <div class="meta">{{ .Date.Format "2006年01月02日" }}
      {{ with .Params.tags }}· {{ range . }}<span class="tag">{{ . }}</span>{{ end }}{{ end }}
    </div>
    <p>{{ .Summary }}</p>
  </article>
  {{ end }}
</div>
{{ end }}
