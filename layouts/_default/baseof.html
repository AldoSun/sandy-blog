<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ block "head_extra" . }}{{ end }}
  <style>
    :root { --max: 860px; --fg: #1a1a1a; --muted: #666; --border: #e0e0e0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 18px/1.8 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
           color: var(--fg); max-width: var(--max); margin: 0 auto; padding: 1.5rem; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
    header a { text-decoration: none; color: var(--fg); font-size: 1.2rem; font-weight: 700; }
    nav a { margin-left: 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    h1 { font-size: 1.8rem; line-height: 1.3; margin-bottom: 0.5rem; }
    h2 { font-size: 1.4rem; margin: 2rem 0 0.5rem; }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 0.4rem; }
    p  { margin-bottom: 1rem; }
    a  { color: #0066cc; }
    .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .tag  { background: #f0f4ff; border-radius: 3px; padding: 2px 8px;
            font-size: 0.8rem; color: #3355aa; margin-right: 4px; }
    article { margin-bottom: 3rem; }
    .post-list article { border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);
             color: var(--muted); font-size: 0.85rem; }
    blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--muted); }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
    pre  { background: #f5f5f5; padding: 1rem; border-radius: 5px; overflow-x: auto;
           margin-bottom: 1rem; }
    pre code { background: none; padding: 0; }
  </style>
</head>
<body>
  <header>
    <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
    <nav>
      <a href="{{ .Site.BaseURL }}">首页</a>
      <a href="{{ "posts/" | absURL }}">文章</a>
      <a href="{{ "index.json" | absURL }}">API</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>Powered by OpenClaw Agent · {{ now.Year }}</p>
  </footer>
</body>
</html>
